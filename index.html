<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anudaan - Email Verified</title>
    <style>
      :root {
        --bg: #f5f5f5;
        --card-bg: #ffffff;
        --text: #111111;
        --muted: #666666;
        --border: #ebebeb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 20px;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      }

      .card {
        width: 100%;
        max-width: 440px;
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 22px;
        padding: 28px 24px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
      }

      .logo {
        width: 56px;
        height: 56px;
        margin: 0 auto 12px;
        border-radius: 14px;
        background: #000;
        display: grid;
        place-items: center;
        color: #fff;
        font-size: 28px;
        font-weight: 800;
      }

      .brand {
        margin: 0;
        font-size: 26px;
        font-weight: 800;
        letter-spacing: -0.3px;
      }

      .subtitle {
        margin: 6px 0 0;
        font-size: 13px;
        color: #8a8a8a;
      }

      .icon-ring {
        width: 72px;
        height: 72px;
        margin: 24px auto 16px;
        border-radius: 36px;
        border: 2px solid #000;
        display: grid;
        place-items: center;
        font-size: 34px;
        line-height: 1;
      }

      h1 {
        margin: 0;
        font-size: 22px;
        font-weight: 700;
      }

      p {
        margin: 10px 0 0;
        color: var(--muted);
        line-height: 1.6;
        font-size: 14px;
      }

      .note {
        margin-top: 18px;
        padding: 10px 12px;
        border-radius: 12px;
        background: #f9f9f9;
        border: 1px solid #efefef;
        color: #444;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="logo">A</div>
      <h2 class="brand">Anudaan</h2>
      <p class="subtitle">Share more, waste less.</p>

      <div class="icon-ring">✓</div>
      <h1>Email verified successfully</h1>
      <p>Your account is now confirmed.</p>
      <p>Please return to the app and sign in to continue.</p>
      <p class="note">You can close this tab now.</p>
    </main>
  </body>
</html>
